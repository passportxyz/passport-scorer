name: Pulumi Only - Deploy Infra
run-name: Run pulumi - ${{github.event.inputs.command || 'preview'}}  - ${{ github.event.inputs.environment || 'staging' }}

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Leave blank to use current HEAD, or provide an override commit SHA"
        type: string
        required: false
      environment:
        description: "Environment to deploy to"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
      command:
        description: "Pulumi command to run"
        required: false
        default: "preview"
        type: choice
        options:
          - preview
          - up
          - refresh

permissions:
  id-token: write
  contents: read

jobs:
  ref:
    name: Load Commit Ref
    runs-on: ubuntu-latest
    steps:
      - id: ref
        uses: passportxyz/gh-workflows/.github/actions/load_commit_ref@v3
        with:
          commit: ${{ inputs.commit }}

    outputs:
      version_tag: ${{ steps.ref.outputs.version_tag }}
      docker_tag: ${{ steps.ref.outputs.docker_tag }}
      refspec: ${{ steps.ref.outputs.refspec }}

  run_pulumi:
    name: Run Pulumi
    needs: [ref]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.refspec }}
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install poetry
        run: |
          pip3 install pipx
          pipx ensurepath
          pipx install poetry
          pipx inject poetry poetry-plugin-export
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1
      - name: Configure 1Password Service Account
        uses: 1password/load-secrets-action/configure@v1
        with:
          service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      - name: Load secret
        id: op-load-secret
        uses: 1password/load-secrets-action@v1
        with:
          export-env: true
        env:
          CLOUDFLARE_API_TOKEN: op://DeployerVault/github-aws-${{ inputs.environment }}/ci/CLOUDFLARE_API_TOKEN

      - name: Yarn install
        uses: passportxyz/gh-workflows/.github/actions/prepare_deploy_to_aws@v3
      - name: Run pulumi
        uses: passportxyz/gh-workflows/.github/actions/deploy_to_aws@v4
        with:
          docker_tag: ${{ inputs.docker_tag }}
          stack_name: ${{ inputs.environment }}
          aws_region: us-west-2
          aws_role_arn: arn:aws:iam::${{ inputs.environment == 'production' && '559026686882' || '515520736917' }}:role/pulumi-ci-passport-scorer-${{ inputs.environment }}
          pulumi_command: ${{ github.event.inputs.command || 'preview' }}
          pulumi_diff: true
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
